name: Prepare release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: bump
        run: |
          current=$(grep -oP "\\\$SCRIPT_VERSION\s*=\s*'\K[^']+" rogue-device-detector.ps1)
          if [ -z "$current" ]; then
            echo "::error::Cannot find \$SCRIPT_VERSION in rogue-device-detector.ps1"
            exit 1
          fi
          echo "Current version: ${current}"

          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          echo "New version: ${new}"

          sed -i "s/\$SCRIPT_VERSION\s*=\s*'${current}'/\$SCRIPT_VERSION       = '${new}'/" rogue-device-detector.ps1

          # Verify the change was applied
          verify=$(grep -oP "\\\$SCRIPT_VERSION\s*=\s*'\K[^']+" rogue-device-detector.ps1)
          if [ "$verify" != "$new" ]; then
            echo "::error::Version replacement failed. Expected '${new}', found '${verify}'."
            exit 1
          fi

          echo "old=${current}" >> "$GITHUB_OUTPUT"
          echo "new=${new}"     >> "$GITHUB_OUTPUT"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new="${{ steps.bump.outputs.new }}"
          old="${{ steps.bump.outputs.old }}"
          branch="release/v${new}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add rogue-device-detector.ps1
          git commit -m "Bump version to ${new}"
          git push -u origin "${branch}"

          gh pr create \
            --title "Release v${new}" \
            --body "$(cat <<EOF
          ## Summary
          - Bump \`\$SCRIPT_VERSION\` from \`${old}\` to \`${new}\`

          ## After merge
          The tag \`v${new}\` will be created automatically, which triggers the release workflow.

          🤖 Generated by [prepare-release](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows/prepare-release.yml) workflow
          EOF
          )"
